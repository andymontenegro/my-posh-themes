# --- Startup Session ---
startup_session session.conf

# --- Typography ---
font_family      MesloLGLNFM-Regular
font_size        21.0
bold_font        auto
italic_font      auto

# Nerd Font mapping
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFF,U+100000-U+10FFFF 3270NF-Cond

# --- Window and UI ---
window_padding_width 12
hide_window_decorations titlebar-only
cursor_blink_interval 0.5

# --- Tab Bar ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

# BEGIN_KITTY_THEME
# Midnight City
include themes/Midnight-City.conf
# END_KITTY_THEME