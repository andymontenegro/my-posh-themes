## name: Midnight City
## author: Andy Montenegro
## license: MIT
## blurb: A Cyberpunk 2077 inspired theme for Night City runners.


# --- Typography ---
# iTerm2 uses MesloLGLNFM at 21px
font_family      MesloLGLNFM-Regular
font_size        21.0
bold_font        auto
italic_font      auto

# Kitty allows mapping a different font for icons (3270 Nerd Font)
# This mimics the "Use Non-ASCII Font" setting from iTerm2
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFF,U+100000-U+10FFFF 3270NF-Cond

# --- Core Colors ---
background            #2E0E14
foreground            #5EF7FF
cursor                #5EF7FF
cursor_text_color     #FFFFFF
selection_background  #69B7B3
selection_foreground  #1E4F4D

# --- Background Image (Samurai BG) ---
background_image      /Users/andy/Documents/code/posh-themes/my-posh-themes/raster-backgrounds/cyberpunk2077-smaurai-bg-2.png
background_image_layout cscaled
background_tint       0.3
background_opacity    0.93

# --- ANSI Palette (Mapped from iTerm2 "Light" set) ---

# Black
color0  #210B09
color8  #4D4D4D

# Red
color1  #CF2E74
color9  #D55944

# Green
color2  #24E183
color10 #2FD382

# Yellow
color3  #F5BF45
color11 #E9D85F

# Blue
color4  #00A2FF
color12 #38B6FF

# Magenta
color5  #A052EC
color13 #CC52EC

# Cyan (Custom orange re-mapping)
color6  #EA9225
color14 #D49529

# White
color7  #BACED1
color15 #D8ECE9

# --- Window and UI ---
window_padding_width 12
hide_window_decorations titlebar-only
macos_titlebar_color system
cursor_blink_interval 0.5

# --- Tab Bar (Inspired by "Silverhand" welcome message) ---
tab_bar_edge top
tab_bar_style powerline
active_tab_foreground   #2E0E14
active_tab_background   #5EF7FF
inactive_tab_foreground #5EF7FF
inactive_tab_background #210B09


